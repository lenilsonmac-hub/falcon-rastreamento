<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falcon Rastreamento</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Falcon">
<meta name="theme-color" content="#0a0f1a">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root[data-theme="dark"]{--bg:#0a0a0a;--bg2:#0f0f0f;--bg3:#141414;--bg4:#1a1a1a;--border:#1e1e1e;--border2:#2a2a2a;--text:#e8e4de;--text2:#888880;--text3:#444440;--blue:#4a9eff;--green:#3ddc84;--yellow:#f5c842;--red:#ff6b6b;--orange:#ff9f43;}
:root[data-theme="light"]{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8f9fb;--bg4:#eef0f3;--border:#e0e2e6;--border2:#cdd0d6;--text:#1a1a18;--text2:#555550;--text3:#999990;--blue:#2b6fd4;--green:#1a9e55;--yellow:#c49a00;--red:#d94040;--orange:#d4660a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding-bottom:80px;transition:background .3s,color .3s;}
.offline-bar{display:none;background:var(--red);color:#fff;text-align:center;padding:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;position:sticky;top:0;z-index:200;}
.offline-bar.show{display:block;}
.sync-queue-bar{display:none;background:var(--yellow);color:#000;text-align:center;padding:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;}
.sync-queue-bar.show{display:block;}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:28px 24px;width:100%;max-width:360px;}
.login-logo{display:flex;justify-content:center;margin-bottom:20px;}
.login-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:4px;display:block;}
.login-input{width:100%;background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:10px 12px;font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--blue);}
.login-btn{width:100%;background:var(--blue);border:none;color:#fff;border-radius:6px;padding:12px;font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:700;cursor:pointer;transition:opacity .2s;letter-spacing:1px;}
.login-btn:hover{opacity:.85;}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-error{background:#ff6b6b22;border:1px solid var(--red);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--red);margin-bottom:12px;display:none;}
.login-loading{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);margin-top:8px;display:none;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.logo-wrap{display:flex;align-items:center;}
.header-actions{display:flex;gap:5px;align-items:center;}
.icon-btn{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:4px;padding:5px 8px;cursor:pointer;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;transition:all .2s;white-space:nowrap;}
.icon-btn:hover{border-color:var(--blue);color:var(--blue);}
.header-sub{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.date-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px;}
.user-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--blue);background:#4a9eff18;border:1px solid #4a9eff33;border-radius:3px;padding:2px 7px;}
.sync-indicator{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);}
.sync-indicator.syncing{color:var(--yellow);}
.sync-indicator.synced{color:var(--green);}
.sync-indicator.error{color:var(--red);}
.sync-indicator.offline{color:var(--red);}
.member-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:6px;overflow-x:auto;}
.member-chip{background:none;border:1px solid var(--border2);color:var(--text3);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.member-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.member-chip.team-chip{border-color:var(--orange);color:var(--orange);}
.member-chip.team-chip.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.progress-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;}
.progress-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);}
.progress-bg{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;padding:10px 12px 8px;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s;}
.tab.active{color:var(--text);border-bottom-color:var(--blue);}
.section{padding:10px 16px 0;}
.mission-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;animation:fadeIn .2s ease;}
.mission-card.pending-sync{border-color:var(--yellow);border-style:dashed;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.status-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;}
.status-btn.pending{background:#ff6b6b22;border:2px solid var(--red);}
.status-btn.ongoing{background:#f5c84222;border:2px solid var(--yellow);}
.status-btn.done{background:#3ddc8422;border:2px solid var(--green);}
.status-btn:active{transform:scale(.9);}
.status-btn.readonly{cursor:default;opacity:.7;}
.mission-body{flex:1;min-width:0;}
.mission-title{font-size:13px;color:var(--text);margin-bottom:4px;line-height:1.4;}
.mission-title.done-text{text-decoration:line-through;color:var(--text3);}
.mission-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.meta-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--text3);border:1px solid var(--border);}
.meta-tag.area-op{border-color:#4a9eff33;color:var(--blue);}
.meta-tag.area-fin{border-color:#3ddc8433;color:var(--green);}
.meta-tag.area-adm{border-color:#f5c84233;color:var(--yellow);}
.meta-tag.area-com{border-color:#ff9f4333;color:var(--orange);}
.meta-tag.area-mkt{border-color:#b06eff33;color:#b06eff;}
.meta-tag.area-ges{border-color:#ff6b6b33;color:var(--red);}
.meta-tag.member{border-color:#4a9eff22;color:var(--blue);background:#4a9eff08;}
.meta-tag.offline-tag{border-color:var(--yellow);color:var(--yellow);}
.btn-sm{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px;border-radius:4px;transition:color .2s;}
.btn-sm:hover{color:var(--red);}
.group-header{display:flex;align-items:center;gap:8px;margin:14px 0 8px;}
.group-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text3);}
.group-line{flex:1;height:1px;background:var(--border);}
.group-count{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);background:var(--bg4);padding:1px 6px;border-radius:3px;}
.team-member-header{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;}
.team-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.team-member-name{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;flex:1;}
.team-member-stats{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);}
.team-member-body{display:none;padding:10px 16px 4px;}
.team-member-body.open{display:block;}
.add-form{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:13px;margin:8px 16px 0;}
.add-form-label{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--text3);margin-bottom:10px;}
.add-row{display:flex;gap:7px;margin-bottom:7px;flex-wrap:wrap;align-items:flex-end;}
.add-row:last-child{margin-bottom:0;}
.field-input{background:var(--bg4);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:7px 9px;font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--blue);}
.field-input::placeholder{color:var(--text3);}
select.field-input{cursor:pointer;}
.btn-add{background:var(--blue);border:none;color:#fff;border-radius:4px;padding:0 14px;font-size:18px;font-weight:700;cursor:pointer;line-height:1;flex-shrink:0;height:34px;transition:opacity .2s;}
.btn-add:hover{opacity:.8;}
.empty{text-align:center;color:var(--text3);padding:24px 0;font-size:12px;font-family:'IBM Plex Mono',monospace;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;margin-bottom:14px;color:var(--blue);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.btn-secondary{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:4px;padding:7px 13px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;}
.btn-primary{background:var(--blue);border:none;color:#fff;border-radius:4px;padding:7px 13px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;}
.btn-danger{background:var(--red);border:none;color:#fff;border-radius:4px;padding:7px 13px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;}
.input-modal{width:100%;background:var(--bg4);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:8px 10px;font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;margin-bottom:8px;}
.input-modal:focus{border-color:var(--blue);}
.btn-action{background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:12px 8px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:center;transition:all .2s;width:100%;}
.btn-action:active{border-color:var(--blue);color:var(--blue);}
.notif-permission{background:#4a9eff18;border:1px solid #4a9eff33;border-radius:6px;padding:10px 12px;font-size:11px;color:var(--blue);margin-bottom:10px;display:none;cursor:pointer;}
</style>
</head>

const OQ_KEY='falcon_offline_queue';
let offlineQueue=JSON.parse(localStorage.getItem(OQ_KEY)||'[]');

function saveQueue(){localStorage.setItem(OQ_KEY,JSON.stringify(offlineQueue));}

function enqueue(op){
  offlineQueue.push({...op,ts:Date.now()});
  saveQueue();
  updateOfflineUI();
}

async function flushQueue(){
  if(!offlineQueue.length)return;
  document.getElementById('syncQueueBar').classList.add('show');
  const failed=[];
  for(const op of offlineQueue){
    try{
      if(op.type==='update_status'){
        const {error}=await sb.from('missions').update({status:op.status,updated_at:new Date().toISOString()}).eq('id',op.id);
        if(error)failed.push(op);
      } else if(op.type==='update_full'){
        const {error}=await sb.from('missions').update({...op.fields,updated_at:new Date().toISOString()}).eq('id',op.id);
        if(error)failed.push(op);
      } else if(op.type==='insert'){
        const {error}=await sb.from('missions').insert([{...op.data,status:'pending'}]);
        if(error)failed.push(op);
      } else if(op.type==='delete'){
        const {error}=await sb.from('missions').delete().eq('id',op.id);
        if(error)failed.push(op);
      }
    }catch(e){failed.push(op);}
  }
  offlineQueue=failed;
  saveQueue();
  document.getElementById('syncQueueBar').classList.remove('show');
  if(!failed.length){
    await loadMissions();
    render();
    setSyncStatus('synced','● sincronizado');
  }
}

function updateOfflineUI(){
  document.getElementById('offlineBar').classList.toggle('show',!isOnline);
  const qbar=document.getElementById('syncQueueBar');
  if(offlineQueue.length>0&&isOnline)qbar.classList.add('show');
  else qbar.classList.remove('show');
}

window.addEventListener('online',async()=>{
  isOnline=true;

  setSyncStatus('syncing','● reconectando...');
  await flushQueue();
});
window.addEventListener('offline',()=>{

async function loadMissions(){

  if(!data||data.length===0){await seedMissions();}

}

async function seedMissions(){
  setSyncStatus('syncing','● carregando missões iniciais...');
  const rows=DEFAULT_MISSIONS.map(m=>({...m,status:'pending'}));
  const {data,error}=await sb.from('missions').insert(rows).select();
  if(!error&&data){missions=data;saveCache();setSyncStatus('synced','● sincronizado');}

async function updateMissionStatus(id,status,memberName,title){
  if(!isOnline){
    enqueue({type:'update_status',id,status});
    setSyncStatus('offline','● salvo offline');
    return;
  }
  setSyncStatus('syncing','● salvando...');
  const {error}=await sb.from('missions').update({status,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){setSyncStatus('error','● erro ao salvar');return;}
  setSyncStatus('synced','● sincronizado');
  // Notifica se missão concluída e não é o próprio usuário marcando
  if(status==='done'&&memberName!==currentUserName){
    sendNotification('✅ Missão concluída',`${memberName}: ${title}`);
  }
}

async function insertMission(m){
  if(!isOnline){
    const tempId=Date.now();
    missions=[...missions,{...m,id:tempId,status:'pending',_offline:true}];
    enqueue({type:'insert',data:m});
    saveCache();render();
    setSyncStatus('offline','● salvo offline');return;
  }
  setSyncStatus('syncing','● salvando...');
  const {data,error}=await sb.from('missions').insert([{...m,status:'pending'}]).select();
  if(!error&&data){missions=[...missions,...data];saveCache();setSyncStatus('synced','● sincronizado');render();}
  else setSyncStatus('error','● erro ao salvar');
}

async function updateMissionFull(id,fields){
  if(!isOnline){
    missions=missions.map(m=>m.id===id?{...m,...fields,_offline:true}:m);
    enqueue({type:'update_full',id,fields});
    saveCache();render();
    setSyncStatus('offline','● salvo offline');return;
  }
  setSyncStatus('syncing','● salvando...');
  const {error}=await sb.from('missions').update({...fields,updated_at:new Date().toISOString()}).eq('id',id);
  if(!error){missions=missions.map(m=>m.id===id?{...m,...fields}:m);saveCache();setSyncStatus('synced','● sincronizado');render();}
  else setSyncStatus('error','● erro ao salvar');
}

async function deleteMissionDB(id){
  if(!isOnline){
    missions=missions.filter(m=>m.id!==id);
    enqueue({type:'delete',id});
    saveCache();render();
    setSyncStatus('offline','● salvo offline');return;
  }
  setSyncStatus('syncing','● excluindo...');
  const {error}=await sb.from('missions').delete().eq('id',id);
  if(!error){missions=missions.filter(m=>m.id!==id);saveCache();setSyncStatus('synced','● sincronizado');render();}
  else setSyncStatus('error','● erro ao excluir');
}

// ═══════════════════════════════
// REALTIME
// ═══════════════════════════════
function setupRealtime(){
  if(!isOnline)return;
  syncChannel=sb.channel('missions-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'missions'},payload=>{
      if(payload.eventType==='UPDATE'){
        const prev=missions.find(m=>m.id===payload.new.id);
        missions=missions.map(m=>m.id===payload.new.id?payload.new:m);
        // Notifica o Iohan quando alguém (não ele) conclui uma missão
        if(payload.new.status==='done'&&(!prev||prev.status!=='done')&&payload.new.member!==currentUserName){
          sendNotification('✅ Missão concluída',`${payload.new.member}: ${payload.new.title}`);
        }
      } else if(payload.eventType==='INSERT'){
        if(!missions.find(m=>m.id===payload.new.id))missions=[...missions,payload.new];
      } else if(payload.eventType==='DELETE'){
        missions=missions.filter(m=>m.id!==payload.old.id);
      }
      saveCache();render();
      setSyncStatus('synced','● atualizado');
    })
    .subscribe();
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){const d=new Date();return`${DAYS[d.getDay()]}, ${d.getDate()} de ${MONTHS_PT[d.getMonth()]} de ${d.getFullYear()}`;}
function areaClass(a){const m={Operações:'area-op',Financeiro:'area-fin',Administrativo:'area-adm',Comercial:'area-com',Marketing:'area-mkt',Gestão:'area-ges',Atendimento:'area-adm'};return m[a]||'';}
function canEdit(m){return currentUserRole==='admin'||m.member===currentUserName;}
function calcProgress(name,type){
  const list=missions.filter(m=>m.member===name&&m.type===type);
  if(!list.length)return{done:0,total:0,pct:0};
  const done=list.filter(m=>m.status==='done').length;
  return{done,total:list.length,pct:Math.round(done/list.length*100)};
}
function setSyncStatus(type,text){const el=document.getElementById('syncIndicator');if(!el)return;el.textContent=text;el.className='sync-indicator '+type;}

  fill.style.background=p.pct===100?'var(--green)':p.pct>=50?'var(--yellow)':'var(--red)';
  document.getElementById('progressPct').textContent=p.pct+'%';
  document.getElementById('progressLabel').textContent=`PROGRESSO — ${p.done}/${p.total} CONCLUÍDAS`;
}

function renderMissions(){
  const list=document.getElementById('missionList');
  if(currentMember==='__team__'||currentTab==='team'){list.innerHTML='';return;}
  const filtered=missions.filter(m=>m.member===currentMember&&m.type===currentTab);
  const areas=[...new Set(filtered.map(m=>m.area))];
  if(!filtered.length){list.innerHTML='<div class="empty">— nenhuma missão —</div>';return;}
  list.innerHTML=areas.map(area=>{
    const aMs=filtered.filter(m=>m.area===area);
    const doneCt=aMs.filter(m=>m.status==='done').length;
    return`<div class="group-header"><span class="group-title">${escHtml(area).toUpperCase()}</span><div class="group-line"></div><span class="group-count">${doneCt}/${aMs.length}</span></div>${aMs.map(m=>missionCard(m)).join('')}`;
  }).join('');
}

function missionCard(m){
  const isDone=m.status==='done',editable=canEdit(m),isOffline=m._offline;
  return`<div class="mission-card ${isOffline?'pending-sync':''}">
    <button class="status-btn ${m.status} ${!editable?'readonly':''}" onclick="${editable?`cycleStatus(${m.id},'${escHtml(m.member)}','${escHtml(m.title).replace(/'/g,"\'")}')`:''}">${STATUS_EMOJI[m.status]}</button>
    <div class="mission-body">
      <div class="mission-title ${isDone?'done-text':''}">${escHtml(m.title)}</div>
      <div class="mission-meta">
        <span class="meta-tag ${areaClass(m.area)}">${escHtml(m.area)}</span>
        <span class="meta-tag member">${escHtml(m.member)}</span>
        <span class="meta-tag">${STATUS_LABEL[m.status]}</span>
        ${isOffline?'<span class="meta-tag offline-tag">⏳ offline</span>':''}
      </div>
    </div>
    ${editable?`<button class="btn-sm" onclick="openEditModal(${m.id})">✎</button>`:''}
  </div>`;
}

function renderTeam(){
  const view=document.getElementById('teamView');
  if(currentTab!=='team'&&currentMember!=='__team__'){view.style.display='none';return;}
  view.style.display='';
  view.innerHTML=members.map(name=>{
    const all=missions.filter(m=>m.member===name);
    const done=all.filter(m=>m.status==='done').length;
    const pct=all.length?Math.round(done/all.length*100):0;
    const color=MEMBER_COLORS[name]||'#4a9eff';
    const daily=missions.filter(m=>m.member===name&&m.type==='daily');
    return`<div style="margin-bottom:2px">
      <div class="team-member-header" onclick="toggleTeam('tb-${name}')">
        <div class="team-avatar" style="background:${color}">${name[0]}</div>
        <span class="team-member-name">${escHtml(name)}</span>
        <span class="team-member-stats">${done}/${all.length} · ${pct}%</span>
        <span style="margin-left:8px;color:var(--text3);font-size:12px">›</span>
      </div>
      <div class="team-member-body" id="tb-${name}">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          ${['daily','weekly','monthly'].map(type=>{
            const p=calcProgress(name,type);
            const label={daily:'Diárias',weekly:'Semanais',monthly:'Mensais'}[type];
            const col=p.pct===100?'var(--green)':p.pct>=50?'var(--yellow)':'var(--red)';
            return`<div style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center">
              <div style="font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--text3);margin-bottom:3px">${label.toUpperCase()}</div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:${col}">${p.pct}%</div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3)">${p.done}/${p.total}</div>
            </div>`;
          }).join('')}
        </div>
        ${daily.map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
          <span>${STATUS_EMOJI[m.status]}</span>
          <span style="font-size:12px;flex:1;color:${m.status==='done'?'var(--text3)':'var(--text)'}${m.status==='done'?';text-decoration:line-through':''}">${escHtml(m.title)}</span>
          <span style="font-size:10px;color:var(--text3)">${escHtml(m.area)}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleTeam(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}

// ═══════════════════════════════
// ACTIONS
// ═══════════════════════════════
async function cycleStatus(id,memberName,title){
  const m=missions.find(m=>m.id===id);if(!m)return;
  const idx=(STATUS.indexOf(m.status)+1)%STATUS.length;
  const newStatus=STATUS[idx];
  missions=missions.map(x=>x.id===id?{...x,status:newStatus}:x);
  saveCache();render();
  await updateMissionStatus(id,newStatus,memberName,title);
}

async function addMission(){
  const title=document.getElementById('newMission').value.trim();if(!title)return;
  const area=document.getElementById('newArea').value;
  const member=document.getElementById('newMemberSel').value;
  const type=document.getElementById('newTypeSel').value;
  document.getElementById('newMission').value='';
  await insertMission({title,area,member,type});
}

function openEditModal(id){
  editingId=id;
  const m=missions.find(m=>m.id===id);if(!m)return;
  document.getElementById('editTitle').value=m.title;
  document.getElementById('editArea').value=m.area;
  const sel=document.getElementById('editMemberSel');
  sel.innerHTML=members.map(n=>`<option value="${escHtml(n)}" ${n===m.member?'selected':''}>${escHtml(n)}</option>`).join('');
  document.getElementById('editModal').classList.add('open');
}

async function saveEdit(){
  if(!editingId)return;
  const fields={title:document.getElementById('editTitle').value.trim(),area:document.getElementById('editArea').value,member:document.getElementById('editMemberSel').value};
  closeModal('editModal');await updateMissionFull(editingId,fields);editingId=null;
}

async function deleteMission(){
  if(!editingId)return;
  const id=editingId;editingId=null;closeModal('editModal');await deleteMissionDB(id);
}

async function resetDailyConfirm(){
  if(!confirm('Resetar todas as missões diárias para "Não iniciada"?'))return;
  const daily=missions.filter(m=>m.type==='daily');
  missions=missions.map(m=>m.type==='daily'?{...m,status:'pending'}:m);
  saveCache();render();
  if(isOnline){
    setSyncStatus('syncing','● resetando...');
    for(const m of daily)await sb.from('missions').update({status:'pending',updated_at:new Date().toISOString()}).eq('id',m.id);
    setSyncStatus('synced','● sincronizado');
  } else {
    daily.forEach(m=>enqueue({type:'update_status',id:m.id,status:'pending'}));
    setSyncStatus('offline','● reset salvo offline');
  }
}

// REPORT

function generateReport(){
  let html='';
  members.forEach(name=>{
    const daily=missions.filter(m=>m.member===name&&m.type==='daily');
    const done=daily.filter(m=>m.status==='done').length;
    const pct=daily.length?Math.round(done/daily.length*100):0;
    html+=`<div style="margin-bottom:14px"><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text3);margin-bottom:8px">${name.toUpperCase()} — ${done}/${daily.length} (${pct}%)</div>
    ${daily.map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span>${STATUS_EMOJI[m.status]}</span><span style="flex:1">${escHtml(m.title)}</span><span style="font-size:10px;color:var(--text3)">${escHtml(m.area)}</span></div>`).join('')}</div>`;
  });
  document.getElementById('reportContent').innerHTML=html;
  document.getElementById('reportModal').classList.add('open');
}

function exportReport(){
  const d=new Date(),ds=`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  let body='';
  members.forEach(name=>{
    const daily=missions.filter(m=>m.member===name&&m.type==='daily');
    const done=daily.filter(m=>m.status==='done').length;
    body+=`<h2 style="font-size:13px;margin:16px 0 8px">${name} — ${done}/${daily.length}</h2>
    <table width="100%" style="border-collapse:collapse;font-size:12px"><tr style="background:#f5f5f5"><th align="left" style="padding:5px 8px">Missão</th><th style="padding:5px 8px">Área</th><th style="padding:5px 8px">Status</th></tr>
    ${daily.map(m=>`<tr style="border-bottom:1px solid #eee"><td style="padding:5px 8px">${escHtml(m.title)}</td><td align="center" style="padding:5px 8px">${escHtml(m.area)}</td><td align="center" style="padding:5px 8px">${STATUS_EMOJI[m.status]} ${STATUS_LABEL[m.status]}</td></tr>`).join('')}</table>`;
  });
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatório ${ds}</title></head><body style="font-family:Arial,sans-serif;padding:28px;color:#111"><h1 style="font-size:18px;margin-bottom:2px">Falcon Rastreamento</h1><p style="color:#888;font-size:12px;margin-bottom:16px">Relatório Diário — ${ds}</p>${body}</body></html>`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download=`falcon_${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}.html`;a.click();
}

function shareWhatsApp(){
  const d=new Date(),ds=`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  let msg=`*Falcon Rastreamento — Relatório Diário*\n*${ds}*\n\n`;
  members.forEach(name=>{
    const daily=missions.filter(m=>m.member===name&&m.type==='daily');
    const done=daily.filter(m=>m.status==='done').length;
    const pct=daily.length?Math.round(done/daily.length*100):0;
    msg+=`👤 *${name}* — ${done}/${daily.length} (${pct}%)\n`;
    daily.forEach(m=>msg+=`${STATUS_EMOJI[m.status]} ${m.title}\n`);
    msg+='\n';
  });
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

// TAB / THEME / MODAL
// ═══════════════════════════════
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  const isTeam=tab==='team';
  if(isTeam)currentMember='__team__';
  document.getElementById('missionList').style.display=isTeam?'none':'';
  document.getElementById('teamView').style.display=isTeam?'':'none';
  const showAdd=!isTeam&&(currentUserRole==='admin'||currentMember===currentUserName);
  document.getElementById('addForm').style.display=showAdd?'':'none';
  renderMemberBar();render();
}

function applyTheme(){document.documentElement.setAttribute('data-theme',theme);const btn=document.getElementById('themeBtn');if(btn)btn.textContent=theme==='dark'?'☀︎':'☾';}
function toggleTheme(){theme=theme==='dark'?'light':'dark';localStorage.setItem('falcon_theme',theme);applyTheme();}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openActionsModal(){document.getElementById('actionsModal').classList.add('open');}

function populateSelects(){
  ['newMemberSel','editMemberSel'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=members.map(n=>`<option value="${escHtml(n)}" ${n===cur?'selected':''}>${escHtml(n)}</option>`).join('');
  });
  const sel=document.getElementById('newMemberSel');
  if(sel&&currentMember&&currentMember!=='__team__')sel.value=currentMember;
}

function render(){
  document.getElementById('dateLabel').textContent=today();
  renderMemberBar();renderProgress();renderMissions();renderTeam();populateSelects();
  const showAdd=currentTab!=='team'&&(currentUserRole==='admin'||currentMember===currentUserName);
  document.getElementById('addForm').style.display=showAdd?'':'none';
}

    let alnk=document.querySelector("link[rel='apple-touch-icon']");if(!alnk){alnk=document.createElement('link');alnk.rel='apple-touch-icon';document.head.appendChild(alnk);}alnk.href=url;
    const manifest={name:'Falcon Rastreamento',short_name:'Falcon',start_url:'.',display:'standalone',background_color:'#0a0f1a',theme_color:'#0a0f1a',icons:[{src:url,sizes:'192x192',type:'image/png'}]};
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    let mlnk=document.querySelector("link[rel='manifest']");if(!mlnk){mlnk=document.createElement('link');mlnk.rel='manifest';document.head.appendChild(mlnk);}mlnk.href=URL.createObjectURL(blob);
  }catch(e){}
});
